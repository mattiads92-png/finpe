<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinPe Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col items-center justify-center">

    <div id="auth-screen" class="w-full max-w-sm px-6 flex flex-col items-center text-center">
        <img src="logo.jpg" alt="FinPe Light Logo" class="w-24 h-24 rounded-2xl shadow-lg mb-6 object-cover bg-white" onerror="this.src='https://via.placeholder.com/100?text=F';">
        <h1 class="font-black text-4xl mb-1 text-slate-900">Fin<span class="text-blue-600">Pe</span> <span class="text-xl text-gray-400 font-light">Light</span></h1>
        <p class="text-sm text-gray-500 mb-10">Area riservata. Sblocca per accedere.</p>
        
        <button id="btn-unlock" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-800 transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
            <i class="fas fa-fingerprint text-2xl"></i> Sblocca App
        </button>
        <p id="auth-msg" class="text-red-500 text-sm mt-4 hidden font-medium"></p>
    </div>

    <div id="app-screen" class="hidden w-full h-full flex-col max-w-md mx-auto relative bg-white shadow-2xl">
        <header class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" alt="Logo" class="w-8 h-8 rounded-lg shadow-sm" onerror="this.style.display='none';">
                <h2 class="font-black text-xl">Fin<span class="text-blue-600">Pe</span></h2>
            </div>
            <button onclick="lockApp()" class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200">
                <i class="fas fa-lock"></i>
            </button>
        </header>
        <main class="flex-1 p-4 overflow-y-auto">
            <div class="p-8 text-center text-gray-400">
                <i class="fas fa-hammer text-4xl mb-3 text-gray-300"></i>
                <p>Database connesso. Interfaccia in costruzione.</p>
            </div>
        </main>
    </div>

    <script>
        // Le chiavi del tuo vecchio progetto recuperate per FinPe Light
        const firebaseConfig = {
            apiKey: "AIzaSyBJo5E4GjwNw9qyS30_4mHHGpo4ve5nErE",
            authDomain: "finpe-385e6.firebaseapp.com",
            projectId: "finpe-385e6",
            storageBucket: "finpe-385e6.firebasestorage.app",
            messagingSenderId: "977985288512",
            appId: "1:977985288512:web:3d0e0d0857bfb28c8f22a5"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Logica di Sblocco Biometrico (WebAuthn / Sblocco Schermo)
        document.getElementById('btn-unlock').addEventListener('click', async () => {
            const msgEl = document.getElementById('auth-msg');
            msgEl.classList.add('hidden');
            
            try {
                // Genera una sfida temporanea per chiedere l'impronta al dispositivo
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                const credential = await navigator.credentials.create({
                    publicKey: {
                        challenge: challenge,
                        rp: { name: "FinPe Light" },
                        user: {
                            id: new Uint8Array(16),
                            name: "utente@finpe",
                            displayName: "Utente FinPe"
                        },
                        pubKeyCredParams: [{type: "public-key", alg: -7}], // ECDSA w/ SHA-256
                        authenticatorSelection: { userVerification: "required" },
                        timeout: 60000
                    }
                });

                if(credential) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('flex');
                }
            } catch (err) {
                console.error(err);
                msgEl.textContent = "Sblocco annullato o non supportato dal dispositivo. Riprova.";
                msgEl.classList.remove('hidden');
            }
        });

        function lockApp() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('flex');
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
