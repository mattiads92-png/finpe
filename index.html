<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinPe Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'slide-down': 'slideDown 0.5s ease-out forwards',
                        'bounce-slight': 'bounceSlight 2s infinite ease-in-out',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(-5%)' },
                            '50%': { transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #ffffff;
        }
        .font-cursive {
            font-family: 'Dancing Script', cursive;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .modal-container { max-height: 85dvh; } 
        .stagger-1 { animation-delay: 50ms; }
        .stagger-2 { animation-delay: 100ms; }
        .stagger-3 { animation-delay: 150ms; }
        .stagger-4 { animation-delay: 200ms; }
        .stagger-5 { animation-delay: 250ms; }
    </style>
</head>
<body class="text-slate-800 h-[100dvh] w-full flex flex-col items-center justify-center overflow-hidden relative bg-white">

    <div id="auth-screen" class="w-full h-full px-6 flex flex-col items-center text-center z-50 absolute inset-0 justify-center bg-white transition-all duration-500">
        <img src="MLogo.webp" alt="FinPe Light Logo" class="w-28 h-28 rounded-3xl shadow-lg mb-6 object-cover bg-white animate-fade-in-up" onerror="this.src='https://via.placeholder.com/100?text=F';">
        <h1 class="font-black text-5xl mb-12 text-slate-950 animate-fade-in-up stagger-1 tracking-tight flex items-center justify-center gap-2">
            FinPe <span class="font-cursive text-gray-400 font-bold text-5xl lowercase tracking-normal mt-2">light</span>
        </h1>
        
        <input type="password" id="pin-input" class="w-full max-w-sm text-center text-4xl tracking-[0.5em] py-5 rounded-2xl border border-slate-200 bg-white mb-6 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all shadow-md animate-fade-in-up stagger-2 text-slate-950" maxlength="4" placeholder="••••" inputmode="numeric">
        
        <div class="flex gap-3 w-full max-w-sm animate-fade-in-up stagger-3">
            <button id="btn-verify-pin" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition transform active:scale-95 text-lg">Sblocca</button>
            <button id="btn-biometric" class="py-4 px-6 bg-slate-900 text-white font-bold rounded-2xl shadow-lg hover:bg-slate-800 transition transform active:scale-95">
                <i class="fas fa-fingerprint text-2xl"></i>
            </button>
        </div>
        <p id="auth-msg" class="text-red-500 text-sm mt-6 hidden font-medium bg-red-50 px-4 py-2 rounded-lg"></p>
    </div>

    <div id="firebase-login-screen" class="hidden w-full h-full px-6 flex-col items-center text-center z-40 absolute inset-0 justify-center bg-white/95 backdrop-blur-sm">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100">
            <h2 class="font-black text-3xl mb-2 text-slate-950 tracking-tight">Cloud Sync</h2>
            <p class="text-sm font-medium text-gray-500 mb-8">Connessione sicura al database.</p>
            <input type="email" id="fb-email" class="w-full p-4 rounded-xl border border-slate-200 bg-white mb-4 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 outline-none transition" placeholder="Email Firebase">
            <input type="password" id="fb-pass" class="w-full p-4 rounded-xl border border-slate-200 bg-white mb-8 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 outline-none transition" placeholder="Password Firebase">
            <button id="btn-fb-login" class="w-full py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-800 transition transform active:scale-95">Sincronizza Dati</button>
            <p id="fb-error" class="text-red-500 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <div id="app-screen" class="hidden w-full h-full flex-col max-w-md md:max-w-3xl mx-auto relative bg-white overflow-hidden border-x border-slate-100">
        
        <header class="p-5 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10 animate-slide-down">
            <div class="flex items-center gap-3">
                <img src="MLogo.webp" alt="Logo" class="w-10 h-10 rounded-xl shadow-md border border-slate-100" onerror="this.style.display='none';">
                <h2 class="font-black text-2xl tracking-tight text-slate-950 flex items-center gap-1">
                    FinPe <span class="font-cursive text-gray-400 text-3xl lowercase tracking-normal mt-1">light</span>
                </h2>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSettings()" class="w-11 h-11 rounded-full bg-white shadow-md border border-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-50 transition transform active:scale-90"><i class="fas fa-cog"></i></button>
            </div>
        </header>
        
        <main class="flex-1 overflow-y-auto relative pb-32 hide-scrollbar bg-slate-50/50 w-full">
            <div class="p-4 sm:p-6 space-y-6 max-w-2xl mx-auto">
                
                <div class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-lg border border-slate-100 animate-fade-in-up">
                    <button onclick="changeCycle(-1)" class="w-12 h-12 rounded-full bg-white text-slate-600 shadow-md hover:bg-slate-50 transition transform active:scale-90 flex items-center justify-center text-lg border border-slate-100"><i class="fas fa-chevron-left"></i></button>
                    <div class="text-center">
                        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Periodo Attuale</div>
                        <div id="cycle-label" class="font-black text-slate-950 text-xl tracking-tight">...</div>
                    </div>
                    <button onclick="changeCycle(1)" class="w-12 h-12 rounded-full bg-white text-slate-600 shadow-md hover:bg-slate-50 transition transform active:scale-90 flex items-center justify-center text-lg border border-slate-100"><i class="fas fa-chevron-right"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center animate-fade-in-up stagger-1">
                        <div class="text-xs font-bold text-red-600 uppercase tracking-wider mb-2">Da Pagare</div>
                        <div id="cycle-pending" class="text-3xl font-black text-red-600 tracking-tight">€ 0.00</div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center animate-fade-in-up stagger-1">
                        <div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Pagate</div>
                        <div id="cycle-paid" class="text-3xl font-black text-slate-950 tracking-tight">€ 0.00</div>
                    </div>
                </div>

                <div id="cycle-list" class="space-y-4 pt-2"></div>
            </div>
        </main>

        <button onclick="openExpenseModal()" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-500/30 flex items-center justify-center text-2xl z-20 hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/40 active:scale-95 active:translate-y-0 transition-all duration-300 animate-bounce-slight border border-white/20">
            <i class="fas fa-plus"></i>
        </button>

        <div id="settings-panel" class="absolute inset-0 bg-white z-30 hidden flex-col transition-colors duration-500">
            <header class="p-5 border-b border-slate-100 flex items-center gap-4 bg-white sticky top-0">
                <button onclick="toggleSettings()" class="w-11 h-11 rounded-full bg-white shadow-md border border-slate-100 flex items-center justify-center hover:bg-slate-50 transition transform active:scale-90"><i class="fas fa-arrow-left text-slate-950"></i></button>
                <h2 class="font-black text-2xl tracking-tight text-slate-950">Impostazioni</h2>
            </header>
            <div class="p-6 max-w-2xl mx-auto w-full flex-1 flex flex-col justify-end pb-12">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-md text-center mb-6">
                    <img src="MLogo.webp" alt="Logo" class="w-16 h-16 rounded-2xl mx-auto mb-4 grayscale" onerror="this.style.display='none';">
                    <p class="font-bold text-slate-950 flex justify-center items-center gap-1">
                        FinPe <span class="font-cursive text-gray-500 font-bold text-xl lowercase">light</span>
                    </p>
                    <p class="text-sm text-gray-500 mt-1">Sincronizzazione Cloud Attiva</p>
                </div>
                <button onclick="lockApp()" class="w-full py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-800 transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                    <i class="fas fa-lock"></i> Blocca App
                </button>
            </div>
        </div>

        <div id="expense-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden flex-col items-center justify-center p-4 transition-opacity opacity-0 duration-300">
            <div id="expense-modal-content" class="bg-white rounded-[2rem] p-6 sm:p-8 shadow-2xl w-full max-w-md flex flex-col modal-container transform scale-95 transition-all duration-300 border border-slate-100">
                <div class="flex justify-between items-center mb-6 shrink-0">
                    <h3 id="modal-title" class="font-black text-3xl tracking-tight text-slate-950">Nuova</h3>
                    <button onclick="closeExpenseModal()" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200 transition transform active:scale-90"><i class="fas fa-times"></i></button>
                </div>
                
                <input type="hidden" id="exp-id">
                
                <div class="space-y-5 overflow-y-auto hide-scrollbar flex-1 pb-2 pr-1">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 block">Descrizione</label>
                        <input type="text" id="exp-desc" class="w-full p-4 rounded-2xl border border-slate-200 bg-white text-slate-950 font-bold focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition shadow-inner" placeholder="Es. Bollo Auto">
                    </div>
                    
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 block">Importo (€)</label>
                        <input type="number" id="exp-amount" step="0.01" class="w-full p-4 rounded-2xl border border-slate-200 bg-white font-black text-3xl text-blue-600 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition shadow-inner" placeholder="0.00">
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                        <button id="btn-type-exact" onclick="setExpDateType('exact')" class="py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 transition-all border border-slate-100">Data Esatta</button>
                        <button id="btn-type-month" onclick="setExpDateType('month')" class="py-2.5 text-sm font-bold rounded-xl text-gray-500 hover:bg-slate-100 transition-all">Solo Mese</button>
                    </div>

                    <div>
                        <input type="date" id="exp-date-exact" class="w-full p-4 rounded-2xl border border-slate-200 bg-white text-slate-950 font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition shadow-inner">
                        <input type="month" id="exp-date-month" class="w-full p-4 rounded-2xl border border-slate-200 bg-white text-slate-950 font-bold hidden outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition shadow-inner">
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-2">Ripeti ogni...</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="exp-recurrence-val" min="1" value="1" class="hidden w-20 p-3 rounded-xl border border-slate-200 bg-white text-slate-950 font-bold outline-none focus:border-blue-500 text-center transition shadow-inner">
                            <select id="exp-recurrence-type" class="p-3 rounded-xl border border-slate-200 bg-white text-slate-950 font-bold outline-none focus:border-blue-500 flex-1 transition shadow-inner" onchange="toggleRecurrenceValue()">
                                <option value="none">Nessuna ricorrenza</option>
                                <option value="d">Giorno/i</option>
                                <option value="m">Mese/i</option>
                                <option value="y">Anno/i</option>
                            </select>
                        </div>
                    </div>

                    <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100 mt-2 transition-colors cursor-pointer w-full">
                        <span class="font-bold select-none text-slate-950">Stato: <span class="text-gray-400 font-normal">Già Pagata?</span></span>
                        <input type="checkbox" id="exp-status" class="w-6 h-6 rounded-lg text-blue-600 bg-white border-slate-300 focus:ring-offset-0 focus:ring-0 cursor-pointer shadow-inner">
                    </label>
                </div>

                <div class="flex gap-3 pt-5 mt-2 border-t border-slate-100 shrink-0">
                    <button id="btn-delete" onclick="deleteExpense()" class="hidden px-5 py-4 bg-red-50 text-red-600 rounded-2xl hover:bg-red-100 transition transform active:scale-95"><i class="fas fa-trash"></i></button>
                    <button onclick="saveExpense()" class="flex-1 py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-800 transition transform active:scale-95 text-lg">Salva Spesa</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJo5E4GjwNw9qyS30_4mHHGpo4ve5nErE",
            authDomain: "finpe-385e6.firebaseapp.com",
            projectId: "finpe-385e6",
            storageBucket: "finpe-385e6.firebasestorage.app",
            messagingSenderId: "977985288512",
            appId: "1:977985288512:web:3d0e0d0857bfb28c8f22a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const APP_PIN = "4036";
        let expenses = [];
        let currentCycleDate = new Date();
        let currentExpDateType = 'exact';

        document.getElementById('btn-verify-pin').addEventListener('click', unlockWithPin);
        document.getElementById('pin-input').addEventListener('keypress', e => { if (e.key === 'Enter') unlockWithPin(); });

        function unlockWithPin() {
            if(document.getElementById('pin-input').value === APP_PIN) checkFirebaseAuth();
            else alert("PIN Errato!");
        }

        document.getElementById('btn-biometric').addEventListener('click', async () => {
            try {
                const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                const cred = await navigator.credentials.create({ publicKey: { challenge, rp: { name: "FinPe Light" }, user: { id: new Uint8Array(16), name: "user", displayName: "User" }, pubKeyCredParams: [{type: "public-key", alg: -7}], authenticatorSelection: { userVerification: "required" }, timeout: 60000 } });
                if(cred) checkFirebaseAuth();
            } catch (err) { alert("Impronta non rilevata. Usa il PIN."); }
        });

        function checkFirebaseAuth() {
            const authScreen = document.getElementById('auth-screen');
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.classList.add('hidden');
                if (auth.currentUser) {
                    initApp();
                } else {
                    document.getElementById('firebase-login-screen').classList.remove('hidden');
                    document.getElementById('firebase-login-screen').classList.add('flex');
                }
            }, 300);
        }

        document.getElementById('btn-fb-login').addEventListener('click', async () => {
            const email = document.getElementById('fb-email').value;
            const pass = document.getElementById('fb-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                document.getElementById('firebase-login-screen').classList.add('hidden');
                document.getElementById('firebase-login-screen').classList.remove('flex');
                initApp();
            } catch (error) {
                document.getElementById('fb-error').textContent = error.message;
                document.getElementById('fb-error').classList.remove('hidden');
            }
        });

        function lockApp() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('flex');
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('settings-panel').classList.remove('flex');
            const authScreen = document.getElementById('auth-screen');
            authScreen.classList.remove('hidden');
            setTimeout(() => authScreen.style.opacity = '1', 50);
            document.getElementById('pin-input').value = "";
        }

        function initApp() {
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('flex');
            loadData();
        }

        function loadData() {
            if(!auth.currentUser) return;
            db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').onSnapshot(snap => {
                expenses = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderCycle();
            });
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.classList.toggle('hidden'); p.classList.toggle('flex');
        }

        function getCycleDates(refDate) {
            const d = new Date(refDate);
            let start, end;
            if (d.getDate() >= 20) {
                start = new Date(d.getFullYear(), d.getMonth(), 20);
                end = new Date(d.getFullYear(), d.getMonth() + 1, 19);
            } else {
                start = new Date(d.getFullYear(), d.getMonth() - 1, 20);
                end = new Date(d.getFullYear(), d.getMonth(), 19);
            }
            return { 
                startStr: start.toISOString().slice(0,10), 
                endStr: end.toISOString().slice(0,10),
                label: `${start.getDate()} ${start.toLocaleString('it',{month:'short'})} - ${end.getDate()} ${end.toLocaleString('it',{month:'short'})} ${end.getFullYear()}`
            };
        }

        function changeCycle(dir) {
            currentCycleDate.setMonth(currentCycleDate.getMonth() + dir);
            renderCycle();
        }

        function renderCycle() {
            const cycle = getCycleDates(currentCycleDate);
            document.getElementById('cycle-label').textContent = cycle.label;
            
            let paid = 0, pending = 0;
            
            // Array separati per mantenere l'ordine esatto: Scadute -> Da Pagare (Mese) -> Pagate
            const overdueExps = [];
            const currentPendingExps = [];
            const currentPaidExps = [];

            expenses.forEach(e => {
                let expDateStr = e.dateType === 'month' ? `${e.date}-01` : e.date;
                
                // Se la data è precedente al ciclo ed è da pagare -> SCADUTA
                if (expDateStr < cycle.startStr && e.status === 'pending') {
                    overdueExps.push(e);
                    pending += e.amount; // Sommiamo le scadute nel totale da pagare
                } 
                // Se è nel ciclo attuale
                else if (expDateStr >= cycle.startStr && expDateStr <= cycle.endStr) {
                    if (e.status === 'pending') {
                        currentPendingExps.push(e);
                        pending += e.amount;
                    } else {
                        currentPaidExps.push(e);
                        paid += e.amount;
                    }
                }
            });

            // Ordinamento per data crescente all'interno di ogni blocco
            const sortByDate = (a, b) => (a.date > b.date ? 1 : -1);
            overdueExps.sort(sortByDate);
            currentPendingExps.sort(sortByDate);
            currentPaidExps.sort(sortByDate);

            let globalIndex = 0;

            const renderItem = (e, type) => {
                let displayDate = "";
                if (e.dateType === 'month') {
                    const parts = e.date.split('-');
                    displayDate = `${parts[1]}/${parts[0]}`;
                } else {
                    const parts = e.date.split('-');
                    displayDate = `${parts[2]}/${parts[1]}`;
                }

                let colorClass = '';
                let descClass = '';
                let containerBg = 'bg-white';
                let pillBg = 'bg-slate-100 text-gray-500';
                let extraBadge = '';

                if (type === 'overdue') {
                    colorClass = 'text-red-700';
                    descClass = 'text-red-700';
                    containerBg = 'bg-red-50 border-red-100'; // Sfondo rosso chiaro
                    pillBg = 'bg-white/80 text-red-800'; 
                    extraBadge = `<span class="text-[10px] bg-red-600 text-white font-bold px-2 py-0.5 rounded-md ml-2 uppercase tracking-wider shadow-sm">Scaduta</span>`;
                } else if (type === 'current-pending') {
                    colorClass = 'text-red-600';
                    descClass = 'text-red-600';
                } else if (type === 'current-paid') {
                    colorClass = 'text-slate-950 line-through';
                    descClass = 'text-slate-950 line-through opacity-70';
                }

                const shadowClass = 'shadow-lg hover:shadow-xl hover:-translate-y-1';
                const staggerClass = `stagger-${(globalIndex % 5) + 1}`;
                globalIndex++;

                return `
                <div onclick="openExpenseModal('${e.id}')" class="animate-fade-in-up ${staggerClass} ${shadowClass} ${containerBg} p-4 sm:p-5 rounded-2xl flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-5 transition-all duration-300 cursor-pointer border border-slate-100">
                    <div class="flex justify-between items-center w-full sm:w-auto">
                        <div class="flex items-center">
                            <div class="text-xs font-bold whitespace-nowrap ${pillBg} px-3 py-1.5 rounded-lg border border-slate-200/50">
                                ${displayDate}
                            </div>
                            ${extraBadge}
                        </div>
                        <div class="font-black text-xl sm:hidden ${colorClass}">
                            € ${e.amount.toFixed(2)}
                        </div>
                    </div>
                    
                    <div class="font-bold flex-1 break-words leading-snug text-lg ${descClass}">
                        ${e.desc}
                    </div>
                    
                    <div class="hidden sm:block font-black text-xl text-right whitespace-nowrap ${colorClass}">
                        € ${e.amount.toFixed(2)}
                    </div>
                </div>`;
            };

            let listHtml = '';
            overdueExps.forEach(e => { listHtml += renderItem(e, 'overdue'); });
            currentPendingExps.forEach(e => { listHtml += renderItem(e, 'current-pending'); });
            currentPaidExps.forEach(e => { listHtml += renderItem(e, 'current-paid'); });

            document.getElementById('cycle-paid').textContent = `€ ${paid.toFixed(2)}`;
            document.getElementById('cycle-pending').textContent = `€ ${pending.toFixed(2)}`;
            document.getElementById('cycle-list').innerHTML = listHtml || '<p class="text-center text-gray-400 text-sm py-10 animate-fade-in-up">Nessuna spesa in questo ciclo.</p>';
        }

        function toggleRecurrenceValue() {
            const type = document.getElementById('exp-recurrence-type').value;
            const valInput = document.getElementById('exp-recurrence-val');
            if(type === 'none') {
                valInput.classList.add('hidden');
            } else {
                valInput.classList.remove('hidden');
            }
        }

        function openExpenseModal(id = null) {
            const m = document.getElementById('expense-modal');
            const c = document.getElementById('expense-modal-content');
            const todayStr = new Date().toISOString().slice(0,10);
            const monthStr = todayStr.slice(0,7);
            
            if(id) {
                const e = expenses.find(x => x.id === id);
                document.getElementById('modal-title').textContent = "Modifica";
                document.getElementById('exp-id').value = e.id;
                document.getElementById('exp-desc').value = e.desc;
                document.getElementById('exp-amount').value = e.amount;
                setExpDateType(e.dateType || 'exact');
                if(e.dateType === 'month') document.getElementById('exp-date-month').value = e.date;
                else document.getElementById('exp-date-exact').value = e.date;
                
                if(e.recurrence && e.recurrence !== 'none') {
                    const match = e.recurrence.match(/(\d+)([dmy])/);
                    if(match) {
                        document.getElementById('exp-recurrence-val').value = match[1];
                        document.getElementById('exp-recurrence-type').value = match[2];
                    }
                } else {
                    document.getElementById('exp-recurrence-val').value = 1;
                    document.getElementById('exp-recurrence-type').value = 'none';
                }
                toggleRecurrenceValue();

                document.getElementById('exp-status').checked = (e.status === 'paid');
                document.getElementById('btn-delete').classList.remove('hidden');
            } else {
                document.getElementById('modal-title').textContent = "Nuova Spesa";
                document.getElementById('exp-id').value = '';
                document.getElementById('exp-desc').value = '';
                document.getElementById('exp-amount').value = '';
                setExpDateType('exact');
                document.getElementById('exp-date-exact').value = todayStr;
                document.getElementById('exp-date-month').value = monthStr;
                
                document.getElementById('exp-recurrence-val').value = 1;
                document.getElementById('exp-recurrence-type').value = 'none';
                toggleRecurrenceValue();

                document.getElementById('exp-status').checked = false;
                document.getElementById('btn-delete').classList.add('hidden');
            }
            
            m.classList.remove('hidden');
            m.classList.add('flex');
            setTimeout(() => {
                m.classList.remove('opacity-0');
                m.classList.add('opacity-100');
                c.classList.remove('scale-95');
                c.classList.add('scale-100');
            }, 10);
        }

        function closeExpenseModal() {
            const m = document.getElementById('expense-modal');
            const c = document.getElementById('expense-modal-content');
            
            m.classList.remove('opacity-100');
            m.classList.add('opacity-0');
            c.classList.remove('scale-100');
            c.classList.add('scale-95');
            
            setTimeout(() => {
                m.classList.add('hidden');
                m.classList.remove('flex');
            }, 300);
        }

        function setExpDateType(type) {
            currentExpDateType = type;
            const bExact = document.getElementById('btn-type-exact');
            const bMonth = document.getElementById('btn-type-month');
            const iExact = document.getElementById('exp-date-exact');
            const iMonth = document.getElementById('exp-date-month');

            if(type === 'exact') {
                bExact.className = 'py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 transition-all border border-slate-100';
                bMonth.className = 'py-2.5 text-sm font-bold rounded-xl text-gray-500 hover:bg-slate-100 transition-all';
                iExact.classList.remove('hidden'); iMonth.classList.add('hidden');
            } else {
                bMonth.className = 'py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 transition-all border border-slate-100';
                bExact.className = 'py-2.5 text-sm font-bold rounded-xl text-gray-500 hover:bg-slate-100 transition-all';
                iMonth.classList.remove('hidden'); iExact.classList.add('hidden');
            }
        }

        async function saveExpense() {
            const id = document.getElementById('exp-id').value;
            const desc = document.getElementById('exp-desc').value;
            const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
            const status = document.getElementById('exp-status').checked ? 'paid' : 'pending';
            const dateType = currentExpDateType;
            const dateStr = dateType === 'exact' ? document.getElementById('exp-date-exact').value : document.getElementById('exp-date-month').value;
            
            let recurrence = 'none';
            const recType = document.getElementById('exp-recurrence-type').value;
            if(recType !== 'none') {
                const recVal = document.getElementById('exp-recurrence-val').value || 1;
                recurrence = recVal + recType; 
            }

            if(!desc || !dateStr) return alert("Inserisci descrizione e data.");

            const expData = { desc, amount, date: dateStr, dateType, status, recurrence };
            const uid = auth.currentUser.uid;

            try {
                if(id) {
                    const oldExp = expenses.find(x => x.id === id);
                    await db.collection('users').doc(uid).collection('expenses_light').doc(id).update(expData);
                    
                    if (status === 'paid' && oldExp.status === 'pending' && recurrence !== 'none') {
                        let nextDate = new Date(dateType === 'month' ? `${dateStr}-01` : dateStr);
                        const rMatch = recurrence.match(/(\d+)([dmy])/);
                        
                        if(rMatch) {
                            const rVal = parseInt(rMatch[1]);
                            const rUnit = rMatch[2];
                            if (rUnit === 'd') nextDate.setDate(nextDate.getDate() + rVal);
                            if (rUnit === 'm') nextDate.setMonth(nextDate.getMonth() + rVal);
                            if (rUnit === 'y') nextDate.setFullYear(nextDate.getFullYear() + rVal);
                            
                            const nextDateStr = dateType === 'month' ? nextDate.toISOString().slice(0,7) : nextDate.toISOString().slice(0,10);
                            
                            await db.collection('users').doc(uid).collection('expenses_light').add({
                                ...expData, status: 'pending', date: nextDateStr
                            });
                        }
                    }
                } else {
                    await db.collection('users').doc(uid).collection('expenses_light').add(expData);
                }
                closeExpenseModal();
            } catch(e) { alert("Errore: " + e.message); }
        }

        async function deleteExpense() {
            if(!confirm("Cancellare questa spesa?")) return;
            const id = document.getElementById('exp-id').value;
            try {
                await db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').doc(id).delete();
                closeExpenseModal();
            } catch(e) { alert("Errore: " + e.message); }
        }

    </script>
</body>
</html>
