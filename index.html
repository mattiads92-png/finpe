    <script>
        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBJo5E4GjwNw9qyS30_4mHHGpo4ve5nErE",
            authDomain: "finpe-385e6.firebaseapp.com",
            projectId: "finpe-385e6",
            storageBucket: "finpe-385e6.firebasestorage.app",
            messagingSenderId: "977985288512",
            appId: "1:977985288512:web:3d0e0d0857bfb28c8f22a5"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // CREDENZIALI
        const APP_PIN = "4036";
        const FB_EMAIL = "mattiads92@gmail.com";
        const FB_PASS = "-273.15m";

        // VARIABILI GLOBALI FINANZE
        let expenses = [];
        let currentCycleDate = new Date();
        let currentExpDateType = 'exact';
        
        // VARIABILI GLOBALI TO-DO
        let todos = [];
        let currentTodoDate = new Date();
        let isShowingArchived = false;
        let currentSubtasks = []; // Array temporaneo per i sottotask durante la modifica

        // --- AUTENTICAZIONE E AVVIO ---
        document.getElementById('btn-verify-pin').addEventListener('click', () => {
            if(document.getElementById('pin-input').value === APP_PIN) {
                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    auth.signInWithEmailAndPassword(FB_EMAIL, FB_PASS).then(initApp).catch(e => alert("Errore connessione DB"));
                }, 300);
            } else { 
                alert("PIN Errato"); 
            }
        });

        function lockApp() { 
            location.reload(); 
        }

        function toggleSettings() { 
            const p = document.getElementById('settings-panel');
            p.classList.toggle('hidden'); 
            p.classList.toggle('flex');
        }

        function initApp() {
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('flex');
            
            const uid = auth.currentUser.uid;

            // Listener Finanze
            db.collection('users').doc(uid).collection('expenses_light').onSnapshot(snapshot => {
                expenses = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderCycle();
            });

            // Listener To-Do
            db.collection('users').doc(uid).collection('todos').onSnapshot(snapshot => {
                todos = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderTodos();
            });

            updateTodoHeaderDate();
        }

        function switchTab(tab) {
            document.getElementById('section-finances').classList.toggle('hidden', tab !== 'finances');
            document.getElementById('section-todo').classList.toggle('hidden', tab !== 'todo');
            
            const tabFinances = document.getElementById('tab-finances');
            const tabTodo = document.getElementById('tab-todo');
            
            if (tab === 'finances') {
                tabFinances.className = "flex flex-col items-center gap-1 text-blue-600 transition-all";
                tabTodo.className = "flex flex-col items-center gap-1 text-slate-400 transition-all";
                document.getElementById('section-title').textContent = 'Finanza';
            } else {
                tabTodo.className = "flex flex-col items-center gap-1 text-emerald-600 transition-all";
                tabFinances.className = "flex flex-col items-center gap-1 text-slate-400 transition-all";
                document.getElementById('section-title').textContent = 'To-Do';
            }
        }

        // --- LOGICA FINANZE (Intatta) ---
        function getCycleDates(refDate) {
            const d = new Date(refDate);
            let startDate, endDate;
            
            if (d.getDate() >= 20) { 
                startDate = new Date(d.getFullYear(), d.getMonth(), 20); 
                endDate = new Date(d.getFullYear(), d.getMonth() + 1, 19); 
            } else { 
                startDate = new Date(d.getFullYear(), d.getMonth() - 1, 20); 
                endDate = new Date(d.getFullYear(), d.getMonth(), 19); 
            }
            
            const labelStr = `${startDate.getDate()} ${startDate.toLocaleString('it',{month:'short'})} - ${endDate.getDate()} ${endDate.toLocaleString('it',{month:'short'})} ${endDate.getFullYear()}`;
            
            return { 
                startStr: startDate.toISOString().slice(0,10), 
                endStr: endDate.toISOString().slice(0,10), 
                label: labelStr 
            };
        }

        function changeCycle(direction) { 
            currentCycleDate.setMonth(currentCycleDate.getMonth() + direction); 
            renderCycle(); 
        }
        
        function renderCycle() {
            const cycle = getCycleDates(currentCycleDate);
            document.getElementById('cycle-label').textContent = cycle.label;
            
            let paidTotal = 0;
            let pendingTotal = 0;
            const container = document.getElementById('cycle-list');
            container.innerHTML = '';

            const itemsInCycle = expenses.filter(e => {
                let formattedDate = e.dateType === 'month' ? `${e.date}-01` : e.date;
                const isCurrentCycle = formattedDate >= cycle.startStr && formattedDate <= cycle.endStr;
                const isOverdue = formattedDate < cycle.startStr && e.status === 'pending';
                
                return isCurrentCycle || isOverdue;
            });

            itemsInCycle.sort((a, b) => {
                if (a.status === b.status) {
                    return a.date > b.date ? 1 : -1;
                }
                return a.status === 'pending' ? -1 : 1;
            });

            itemsInCycle.forEach(e => {
                if (e.status === 'pending') {
                    pendingTotal += e.amount;
                } else {
                    paidTotal += e.amount;
                }
                
                let formattedDate = e.dateType === 'month' ? `${e.date}-01` : e.date;
                const isOverdueItem = (formattedDate < cycle.startStr) && e.status === 'pending';

                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-2xl shadow-sm border ${isOverdueItem ? 'border-red-200' : 'border-slate-100'} flex items-center justify-between cursor-pointer transition active:scale-[0.98] ${e.status === 'paid' ? 'opacity-60' : ''}`;
                div.onclick = () => openExpenseModal(e.id);
                
                const displayDate = e.date.split('-').reverse().slice(0,2).join('/');
                
                const descColorClass = e.status === 'paid' ? 'line-through text-gray-400 font-bold' : (isOverdueItem ? 'text-red-600 font-bold' : 'text-slate-900 font-bold');
                const amountColorClass = e.status === 'paid' ? 'text-gray-500' : (isOverdueItem ? 'text-red-600' : 'text-blue-600');
                const overdueBadge = isOverdueItem ? `<span class="bg-red-100 text-red-700 text-[9px] font-black px-2 py-0.5 rounded ml-2 uppercase">Scaduta</span>` : '';
                
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-[10px] font-bold bg-slate-100 text-gray-500 px-2 py-1 rounded-lg">${displayDate}</div>
                        <div class="${descColorClass}">${e.desc}${overdueBadge}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="font-black text-xl ${amountColorClass}">€ ${e.amount.toFixed(2)}</div>
                        <button onclick="event.stopPropagation(); deleteExpenseRapido('${e.id}')" class="text-slate-300 hover:text-red-500 active:scale-90 transition p-1">
                            <i class="fas fa-trash-can"></i>
                        </button>
                    </div>
                `;
                
                container.appendChild(div);
            });
            
            if(itemsInCycle.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-6 text-sm">Nessuna spesa nel periodo.</p>';
            }
            
            document.getElementById('cycle-pending').textContent = `€ ${pendingTotal.toFixed(2)}`;
            document.getElementById('cycle-paid').textContent = `€ ${paidTotal.toFixed(2)}`;
        }

        async function deleteExpenseRapido(id) {
            if(confirm("Sei sicuro di voler eliminare questa spesa?")) {
                await db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').doc(id).delete(); 
            }
        }

        function setExpDateType(type) { 
            currentExpDateType = type; 
            
            const btnExact = document.getElementById('btn-type-exact');
            const btnMonth = document.getElementById('btn-type-month');
            const inputExact = document.getElementById('exp-date-exact');
            const inputMonth = document.getElementById('exp-date-month');

            if(type === 'exact') {
                btnExact.className = 'py-2.5 text-sm bg-white shadow-sm rounded-xl text-blue-600 font-bold border border-slate-100 transition';
                btnMonth.className = 'py-2.5 text-sm text-gray-500 font-bold transition';
                inputExact.classList.remove('hidden');
                inputMonth.classList.add('hidden');
            } else {
                btnMonth.className = 'py-2.5 text-sm bg-white shadow-sm rounded-xl text-blue-600 font-bold border border-slate-100 transition';
                btnExact.className = 'py-2.5 text-sm text-gray-500 font-bold transition';
                inputMonth.classList.remove('hidden');
                inputExact.classList.add('hidden');
            }
        }

        function openExpenseModal(id = null) { 
            const modal = document.getElementById('expense-modal'); 
            modal.classList.remove('hidden'); 
            modal.classList.add('flex');
            setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            
            const delBtn = document.getElementById('btn-delete-exp');
            
            if(id) { 
                const e = expenses.find(x => x.id === id); 
                document.getElementById('modal-title').textContent = "Modifica Spesa";
                document.getElementById('exp-id').value = e.id; 
                document.getElementById('exp-old-status').value = e.status; 
                document.getElementById('exp-desc').value = e.desc; 
                document.getElementById('exp-amount').value = e.amount; 
                
                document.getElementById('exp-recurrence-unit').value = e.recurrenceUnit || (e.recurrence && e.recurrence !== 'none' ? e.recurrence : 'none');
                document.getElementById('exp-recurrence-val').value = e.recurrenceVal || 1;
                
                document.getElementById('exp-status').checked = (e.status === 'paid'); 
                
                setExpDateType(e.dateType || 'exact'); 
                
                if(e.dateType === 'month') {
                    document.getElementById('exp-date-month').value = e.date; 
                } else {
                    document.getElementById('exp-date-exact').value = e.date;
                }
                
                delBtn.classList.remove('hidden');
            } else { 
                document.getElementById('modal-title').textContent = "Nuova Spesa";
                document.getElementById('exp-id').value = ''; 
                document.getElementById('exp-old-status').value = ''; 
                document.getElementById('exp-desc').value = ''; 
                document.getElementById('exp-amount').value = ''; 
                
                document.getElementById('exp-recurrence-unit').value = 'none';
                document.getElementById('exp-recurrence-val').value = '1';
                
                document.getElementById('exp-status').checked = false; 
                
                delBtn.classList.add('hidden');
            }
        }

        function closeExpenseModal() { 
            const modal = document.getElementById('expense-modal');
            modal.classList.replace('opacity-100', 'opacity-0'); 
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                modal.classList.remove('flex'); 
            }, 300); 
        }

        function calcNextRecurrence(dateStr, unit, val, dateType) {
            val = parseInt(val) || 1;
            if (dateType === 'exact') {
                let [y, m, d] = dateStr.split('-');
                let dateObj = new Date(y, m - 1, d);
                
                if (unit === 'd') dateObj.setDate(dateObj.getDate() + val);
                if (unit === 'm') dateObj.setMonth(dateObj.getMonth() + val);
                if (unit === 'y') dateObj.setFullYear(dateObj.getFullYear() + val);
                
                let ny = dateObj.getFullYear();
                let nm = String(dateObj.getMonth() + 1).padStart(2, '0');
                let nd = String(dateObj.getDate()).padStart(2, '0');
                return `${ny}-${nm}-${nd}`;
            } else {
                let [y, m] = dateStr.split('-');
                let dateObj = new Date(y, m - 1, 1);
                
                if (unit === 'd') dateObj.setDate(dateObj.getDate() + val);
                if (unit === 'm') dateObj.setMonth(dateObj.getMonth() + val);
                if (unit === 'y') dateObj.setFullYear(dateObj.getFullYear() + val);
                
                let ny = dateObj.getFullYear();
                let nm = String(dateObj.getMonth() + 1).padStart(2, '0');
                return `${ny}-${nm}`;
            }
        }
        
        async function saveExpense() {
            const id = document.getElementById('exp-id').value;
            const oldStatus = document.getElementById('exp-old-status').value;
            const newStatus = document.getElementById('exp-status').checked ? 'paid' : 'pending';
            const expDate = currentExpDateType === 'exact' ? document.getElementById('exp-date-exact').value : document.getElementById('exp-date-month').value;
            
            const recurrenceUnit = document.getElementById('exp-recurrence-unit').value;
            const recurrenceVal = parseInt(document.getElementById('exp-recurrence-val').value) || 1;
            
            const dataToSave = { 
                desc: document.getElementById('exp-desc').value, 
                amount: parseFloat(document.getElementById('exp-amount').value) || 0, 
                status: newStatus, 
                dateType: currentExpDateType, 
                date: expDate,
                recurrenceUnit: recurrenceUnit,
                recurrenceVal: recurrenceVal
            };
            
            if(!dataToSave.desc || !dataToSave.date) {
                return alert("Inserisci descrizione e data");
            }
            
            const collectionRef = db.collection('users').doc(auth.currentUser.uid).collection('expenses_light');
            let shouldClone = false;

            if(id) {
                if (oldStatus === 'pending' && newStatus === 'paid' && recurrenceUnit !== 'none') {
                    shouldClone = true;
                }
                await collectionRef.doc(id).update(dataToSave);
            } else {
                if (newStatus === 'paid' && recurrenceUnit !== 'none') {
                    shouldClone = true;
                }
                await collectionRef.add(dataToSave);
            }

            if (shouldClone) {
                const nextDateStr = calcNextRecurrence(expDate, recurrenceUnit, recurrenceVal, currentExpDateType);
                const clonedData = {
                    ...dataToSave,
                    status: 'pending',
                    date: nextDateStr
                };
                await collectionRef.add(clonedData);
            }
            
            closeExpenseModal();
        }

        async function deleteExpense() { 
            if(confirm("Sei sicuro di voler eliminare questa spesa?")) {
                const idToDelete = document.getElementById('exp-id').value;
                await db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').doc(idToDelete).delete(); 
                closeExpenseModal(); 
            }
        }

        // --- LOGICA TO-DO ---
        function getDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        function changeTodoDay(direction) {
            currentTodoDate.setDate(currentTodoDate.getDate() + direction);
            updateTodoHeaderDate();
            renderTodos();
        }

        function updateTodoHeaderDate() {
            const todayStr = getDateString(new Date());
            const selectedStr = getDateString(currentTodoDate);
            const opzioniData = { weekday: 'long', day: 'numeric', month: 'long' };
            
            if (selectedStr === todayStr) {
                document.getElementById('todo-today').textContent = "Oggi";
            } else {
                document.getElementById('todo-today').textContent = currentTodoDate.toLocaleDateString('it-IT', opzioniData);
            }
        }

        function toggleTodoArchive() {
            isShowingArchived = !isShowingArchived;
            const btn = document.getElementById('btn-todo-archive');
            const nav = document.getElementById('todo-navigator');
            const title = document.getElementById('todo-list-title');

            if (isShowingArchived) {
                btn.innerHTML = '<i class="fas fa-list mr-1"></i> Mostra Attive';
                nav.classList.add('hidden');
                nav.classList.remove('flex');
                title.textContent = 'Archivio Storico';
            } else {
                btn.innerHTML = '<i class="fas fa-box-archive mr-1"></i> Mostra Archiviate';
                nav.classList.remove('hidden');
                nav.classList.add('flex');
                title.textContent = 'Cose da fare';
            }
            renderTodos();
        }

        function renderTodos() {
            const container = document.getElementById('todo-logs-container');
            container.innerHTML = '';
            
            const todayStr = getDateString(new Date());
            const selectedStr = getDateString(currentTodoDate);

            // Filtro e ordino le task
            let visibleTodos = todos.filter(t => {
                if (isShowingArchived) {
                    return t.archived === true;
                } else {
                    if (t.archived === true) return false;
                    // Se la vista è su "Oggi", includo anche quelle scadute (data passata)
                    if (selectedStr === todayStr) {
                        return t.dueDate <= todayStr;
                    }
                    // Altrimenti visualizzo solo il giorno selezionato
                    return t.dueDate === selectedStr;
                }
            });

            // Ordine: Prima le più vecchie
            visibleTodos.sort((a, b) => a.dueDate.localeCompare(b.dueDate));

            if(visibleTodos.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-6 text-sm">${isShowingArchived ? "Nessuna task archiviata." : "Nessuna task per questa giornata."}</p>`;
                return;
            }

            visibleTodos.forEach(t => {
                const isOverdue = !isShowingArchived && t.dueDate < todayStr;
                
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-2xl shadow-sm border ${isOverdue ? 'border-red-200 bg-red-50/30' : 'border-slate-100'} cursor-pointer transition active:scale-[0.98]`;
                div.onclick = () => openTodoModal(t.id);

                const displayDate = t.dueDate.split('-').reverse().slice(0,2).join('/');
                const badge = isOverdue ? `<span class="bg-red-100 text-red-700 text-[9px] font-black px-2 py-0.5 rounded uppercase">Scaduta</span>` : '';
                
                // Conto i sottotask completati
                let subText = '';
                if (t.subtasks && t.subtasks.length > 0) {
                    const doneCount = t.subtasks.filter(st => st.done).length;
                    subText = `<div class="text-[10px] font-bold text-gray-400 mt-1"><i class="fas fa-list-check mr-1"></i> ${doneCount}/${t.subtasks.length} Sottotask</div>`;
                }

                div.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <div class="text-[10px] font-bold bg-slate-100 text-gray-500 px-2 py-0.5 rounded-lg">${displayDate}</div>
                                ${badge}
                            </div>
                            <div class="font-bold text-slate-900 ${t.archived ? 'line-through text-gray-500' : ''}">${t.title}</div>
                            ${subText}
                        </div>
                        ${t.archived ? '<i class="fas fa-check-circle text-emerald-500 text-xl"></i>' : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openTodoModal(id = null) { 
            const modal = document.getElementById('todo-modal'); 
            modal.classList.remove('hidden'); 
            modal.classList.add('flex');
            setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            
            const delBtn = document.getElementById('btn-delete-todo');
            
            if(id) { 
                const t = todos.find(x => x.id === id); 
                document.getElementById('todo-modal-title').textContent = "Modifica Task";
                document.getElementById('todo-id').value = t.id; 
                document.getElementById('todo-title').value = t.title; 
                document.getElementById('todo-desc').value = t.desc || ''; 
                document.getElementById('todo-date').value = t.dueDate; 
                document.getElementById('todo-archived').checked = t.archived || false; 
                
                currentSubtasks = t.subtasks ? JSON.parse(JSON.stringify(t.subtasks)) : [];
                delBtn.classList.remove('hidden');
            } else { 
                document.getElementById('todo-modal-title').textContent = "Nuova Task";
                document.getElementById('todo-id').value = ''; 
                document.getElementById('todo-title').value = ''; 
                document.getElementById('todo-desc').value = ''; 
                document.getElementById('todo-date').value = getDateString(currentTodoDate); 
                document.getElementById('todo-archived').checked = false; 
                
                currentSubtasks = [];
                delBtn.classList.add('hidden');
            }

            renderSubtasksUI();
        }

        function closeTodoModal() { 
            const modal = document.getElementById('todo-modal');
            modal.classList.replace('opacity-100', 'opacity-0'); 
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                modal.classList.remove('flex'); 
                document.getElementById('subtask-title').value = '';
                document.getElementById('subtask-date').value = '';
            }, 300); 
        }

        // Funzioni per Sottotask interni alla Modale
        function renderSubtasksUI() {
            const list = document.getElementById('todo-subtasks-list');
            list.innerHTML = '';
            
            if (currentSubtasks.length === 0) {
                list.innerHTML = '<p class="text-[10px] text-gray-400 italic">Nessun sottotask registrato.</p>';
                return;
            }

            currentSubtasks.forEach((st, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between gap-2 p-2 bg-white rounded-xl border border-slate-100";
                
                const dateDisplay = st.date ? `<span class="text-[9px] bg-slate-100 px-1 rounded font-bold">${st.date.split('-').reverse().slice(0,2).join('/')}</span>` : '';

                div.innerHTML = `
                    <div class="flex items-center gap-2 flex-1 cursor-pointer" onclick="toggleSubtaskStatus(${index})">
                        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${st.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'}">
                            ${st.done ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-bold ${st.done ? 'line-through text-gray-400' : 'text-slate-800'}">${st.title}</span>
                            ${dateDisplay}
                        </div>
                    </div>
                    <button onclick="removeSubtask(${index})" class="text-slate-300 hover:text-red-500 p-1">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        function addSubtaskFromUI() {
            const titleInput = document.getElementById('subtask-title');
            const dateInput = document.getElementById('subtask-date');
            
            if(!titleInput.value.trim()) return;

            currentSubtasks.push({
                title: titleInput.value.trim(),
                date: dateInput.value,
                done: false
            });

            titleInput.value = '';
            dateInput.value = '';
            renderSubtasksUI();
        }

        function removeSubtask(index) {
            currentSubtasks.splice(index, 1);
            renderSubtasksUI();
        }

        function toggleSubtaskStatus(index) {
            currentSubtasks[index].done = !currentSubtasks[index].done;
            renderSubtasksUI();
        }

        // Salvataggio Todo Completo
        async function saveTodo() {
            const id = document.getElementById('todo-id').value;
            const title = document.getElementById('todo-title').value.trim();
            const desc = document.getElementById('todo-desc').value;
            const dueDate = document.getElementById('todo-date').value;
            const isArchived = document.getElementById('todo-archived').checked;
            
            if(!title || !dueDate) {
                return alert("Inserisci un titolo e una data di scadenza");
            }
            
            const dataToSave = { 
                title: title, 
                desc: desc,
                dueDate: dueDate,
                archived: isArchived,
                subtasks: currentSubtasks,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            const collectionRef = db.collection('users').doc(auth.currentUser.uid).collection('todos');
            
            if(id) {
                await collectionRef.doc(id).update(dataToSave);
            } else {
                await collectionRef.add(dataToSave);
            }
            
            closeTodoModal();
        }

        async function deleteTodo() { 
            if(confirm("Sei sicuro di voler eliminare definitivamente questa task?")) {
                const idToDelete = document.getElementById('todo-id').value;
                await db.collection('users').doc(auth.currentUser.uid).collection('todos').doc(idToDelete).delete(); 
                closeTodoModal(); 
            }
        }

        // PUNTO A: Script per attivare il Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrato con successo.'))
                    .catch(err => console.log('Registrazione Service Worker fallita:', err));
            });
        }

    </script>
